<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SSE Distributed Event Bus Demo</title>
  <style>
    :root {
      color-scheme: light;
      --page-bg: #f8fafc;
      --surface: #ffffff;
      --surface-alt: #f8fafc;
      --surface-elevated: #fdfefe;
      --border: #d7e0ec;
      --border-strong: #c3d1e3;
      --text: #0f172a;
      --text-muted: #475569;
      --text-subtle: #64748b;
      --node-a: #2563eb;
      --node-a-soft: #dbeafe;
      --node-a-border: #93c5fd;
      --node-a-meta: #1d4ed8;
      --node-b: #16a34a;
      --node-b-soft: #dcfce7;
      --node-b-border: #86efac;
      --node-b-meta: #15803d;
      --transport-accent: #0f766e;
      --transport-chip-bg: #f0fdfa;
      --transport-chip-border: #99f6e4;
      --transport-chip-text: #115e59;
      --remote-bg: #fff7ed;
      --remote-border: #fdba74;
      --remote-text: #9a3412;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--page-bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    header {
      padding: 16px 24px;
      background: rgba(255, 255, 255, 0.88);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
      backdrop-filter: blur(10px);
    }

    header h1 {
      font-size: 18px;
      font-weight: 600;
      letter-spacing: -0.3px;
    }

    header .subtitle {
      font-size: 13px;
      color: var(--text-subtle);
    }

    .transport-badge {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 6px;
      background: var(--transport-chip-bg);
      border: 1px solid var(--transport-chip-border);
      border-radius: 0;
      padding: 4px 12px;
      font-size: 12px;
      color: var(--transport-chip-text);
    }

    .transport-badge::before {
      content: '';
      width: 8px;
      height: 8px;
      background: var(--transport-accent);
      display: block;
    }

    .layout {
      flex: 1;
      display: grid;
      grid-template-columns: 1fr 48px 1fr;
      overflow: hidden;
      gap: 16px;
      padding: 16px;
    }

    .divider {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      color: var(--text-subtle);
      font-size: 11px;
      user-select: none;
    }

    .divider-line {
      flex: 1;
      width: 1px;
      background: var(--border);
    }

    .divider-arrow {
      font-size: 16px;
      color: var(--transport-accent);
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.4; transform: scale(0.9); }
      50% { opacity: 1; transform: scale(1.1); }
    }

    .panel {
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: rgba(255, 255, 255, 0.72);
      border: 1px solid rgba(215, 224, 236, 0.9);
      border-radius: 0;
      backdrop-filter: blur(12px);
    }

    .panel-header {
      padding: 14px 20px 12px;
      background: rgba(255, 255, 255, 0.8);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }

    .panel-title {
      font-size: 15px;
      font-weight: 600;
    }

    .panel-a .panel-title { color: var(--node-a); }
    .panel-b .panel-title { color: var(--node-b); }

    .status-dot {
      width: 9px;
      height: 9px;
      background: #cbd5e1;
      transition: background 0.3s ease;
      flex-shrink: 0;
    }

    .status-dot.connected { background: #22c55e; }
    .status-dot.error { background: #ef4444; }

    .status-label {
      font-size: 12px;
      color: var(--text-subtle);
      margin-left: auto;
    }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px 20px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      background: var(--surface-alt);
    }

    .messages::-webkit-scrollbar { width: 4px; }
    .messages::-webkit-scrollbar-track { background: transparent; }
    .messages::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 0; }

    .message {
      max-width: 80%;
      padding: 10px 14px;
      border-radius: 0;
      font-size: 14px;
      line-height: 1.4;
      animation: slideIn 0.15s ease-out;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .message.from-a {
      background: var(--node-a-soft);
      border: 1px solid var(--node-a-border);
      align-self: flex-start;
    }

    .message.from-b {
      background: var(--node-b-soft);
      border: 1px solid var(--node-b-border);
      align-self: flex-end;
    }

    .message-meta {
      font-size: 11px;
      opacity: 0.8;
      margin-bottom: 3px;
    }

    .message.from-a .message-meta { color: var(--node-a-meta); }
    .message.from-b .message-meta { color: var(--node-b-meta); }

    .message-text { color: var(--text); }

    .remote-indicator {
      display: inline-block;
      font-size: 10px;
      background: var(--remote-bg);
      border: 1px solid var(--remote-border);
      color: var(--remote-text);
      border-radius: 0;
      padding: 1px 5px;
      margin-left: 6px;
      vertical-align: middle;
    }

    .input-row {
      display: flex;
      gap: 8px;
      padding: 14px 20px;
      background: rgba(255, 255, 255, 0.8);
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }

    .input-row input {
      flex: 1;
      background: var(--surface-elevated);
      border: 1px solid var(--border-strong);
      border-radius: 0;
      padding: 9px 14px;
      font-size: 14px;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s;
    }

    .input-row input:focus { border-color: var(--node-a); }
    .panel-b .input-row input:focus { border-color: var(--node-b); }

    .input-row input::placeholder { color: #94a3b8; }

    .input-row button {
      padding: 9px 18px;
      border-radius: 0;
      border: none;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
    }

    .input-row button:active { transform: scale(0.97); }

    .panel-a .input-row button {
      background: var(--node-a);
      color: #fff;
    }

    .panel-b .input-row button {
      background: var(--node-b);
      color: #fff;
    }

    .input-row button:disabled { opacity: 0.4; cursor: not-allowed; }

    .empty-hint {
      color: #94a3b8;
      font-size: 13px;
      text-align: center;
      margin: auto;
    }
  </style>
</head>
<body>
  <header>
    <div>
      <h1>SSE Distributed Event Bus</h1>
      <div class="subtitle">Messages flow across nodes via Valkey pub/sub</div>
    </div>
    <div class="transport-badge">Valkey pub/sub</div>
  </header>

  <div class="layout">
    <div class="panel panel-a" id="panel-a"></div>
    <div class="divider">
      <div class="divider-line"></div>
      <div class="divider-arrow">⇄</div>
      <div class="divider-line"></div>
    </div>
    <div class="panel panel-b" id="panel-b"></div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
